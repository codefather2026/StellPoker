{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "soroban-rpc-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "soroban-rpc-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "soroban-rpc-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only the coordinator may query the Soroban RPC endpoint.
    - from:
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressFromCoordinator.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Stellar Horizon and peer discovery (mainnet / testnet).
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 11625
        - protocol: TCP
          port: 11626
    # DNS resolution.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
