replicaCount: 1

image:
  repository: ghcr.io/hitempoka/stellpoker/frontend
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 3000

env:
  NODE_ENV: "production"
  PORT: "3000"

# NEXT_PUBLIC_* vars and the coordinator API URL.
# coordinatorUrl is injected as NEXT_PUBLIC_COORDINATOR_URL.
coordinatorUrl: "http://coordinator:8080"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

networkPolicy:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
